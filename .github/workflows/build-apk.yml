name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}
        run: ./gradlew assembleDebug -PrelayUrl="$RELAY_URL"

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: Automatically built from the latest push to main. Download `app-debug.apk` below and sideload it.
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
